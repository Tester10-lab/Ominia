<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="OMINIA Event Planner — a premium, mobile-first event management and calendar application. Plan, organise, and manage your events beautifully." />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="OMINIA" />
  <meta property="og:title" content="OMINIA Event Planner" />
  <meta property="og:description" content="Plan, organise, and manage your events beautifully." />
  <meta property="og:type" content="website" />
  <title>OMINIA Event Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       SPLASH SCREEN
       ═══════════════════════════════════════════ -->
  <div id="splash" class="splash" role="status" aria-label="Loading OMINIA Event Planner">
    <div class="splash-inner">
      <div class="splash-logo">
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none" aria-hidden="true">
          <rect width="72" height="72" rx="20" fill="url(#sg)"/>
          <path d="M18 22h10v28H18zM32 22h10v10H32zM32 40h10v10H32zM46 22h8v12h-8zM46 38h8v12h-8z" fill="white" opacity="0.95"/>
          <defs><linearGradient id="sg" x1="0" y1="0" x2="72" y2="72"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs>
        </svg>
      </div>
      <h1 class="splash-name">OMINIA</h1>
      <p class="splash-tagline">Event Planner</p>
      <div class="splash-loader"><div class="splash-bar"></div></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       APP SHELL
       ═══════════════════════════════════════════ -->
  <div id="app" class="app app-hidden" aria-hidden="true">

    <!-- Top Navigation -->
    <header class="top-nav" role="banner">
      <div class="nav-brand" aria-label="OMINIA Event Planner">
        <svg class="brand-logo" width="34" height="34" viewBox="0 0 72 72" fill="none" aria-hidden="true">
          <rect width="72" height="72" rx="18" fill="url(#ng)"/>
          <path d="M18 22h10v28H18zM32 22h10v10H32zM32 40h10v10H32zM46 22h8v12h-8zM46 38h8v12h-8z" fill="white" opacity="0.95"/>
          <defs><linearGradient id="ng" x1="0" y1="0" x2="72" y2="72"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs>
        </svg>
        <div class="brand-copy">
          <span class="brand-name">OMINIA</span>
          <span class="brand-sub">Event Planner</span>
        </div>
      </div>

      <button class="search-trigger" id="searchTrigger" aria-label="Search events (Ctrl+K)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <span class="search-trigger-text">Search events…</span>
        <kbd class="search-kbd">⌘K</kbd>
      </button>

      <div class="nav-end">
        <button id="authBtn" class="today-btn" style="margin-right: 12px; white-space: nowrap;">Sign In</button>
        <span class="tz-pill" id="tzBadge" title="Your local timezone"></span>
        <button class="nav-icon-btn" id="themeToggle" aria-label="Toggle dark mode">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="nav-icon-btn" id="notifBtn" aria-label="Enable event reminders">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
      </div>
    </header>

    <!-- Layout -->
    <div class="layout">

      <!-- ── Sidebar ── -->
      <aside class="sidebar" id="sidebar" aria-label="Events dashboard">

        <div class="stat-grid">
          <div class="stat-card stat-accent">
            <span class="stat-val" id="statTotal">0</span>
            <span class="stat-lbl">Total</span>
          </div>
          <div class="stat-card stat-green">
            <span class="stat-val" id="statThisWeek">0</span>
            <span class="stat-lbl">This Week</span>
          </div>
          <div class="stat-card stat-purple">
            <span class="stat-val" id="statToday">0</span>
            <span class="stat-lbl">Today</span>
          </div>
        </div>

        <div class="sb-section">
          <p class="sb-label">Filter by Category</p>
          <div id="filterChips" class="filter-chips" role="group" aria-label="Category filters"></div>
        </div>

        <div class="sb-section sb-grow">
          <div class="sb-section-hdr">
            <p class="sb-label">Upcoming Events</p>
            <span id="eventCount" class="count-badge" aria-live="polite">0</span>
          </div>
          <div id="upcomingList" class="upcoming-list" aria-live="polite" aria-label="Upcoming events"></div>
        </div>
      </aside>

      <!-- ── Main Content ── -->
      <main class="main-area" id="mainArea">

        <!-- Calendar Toolbar -->
        <div class="cal-bar">
          <div class="cal-bar-left">
            <button id="prevBtn" class="nav-arrow" aria-label="Previous period">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button id="todayBtn" class="today-btn">Today</button>
            <button id="nextBtn" class="nav-arrow" aria-label="Next period">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
            <h2 id="calTitle" class="cal-title"></h2>
          </div>
          <div class="cal-bar-right">
            <div class="view-switcher" role="tablist" aria-label="Calendar view">
              <button class="view-btn active" data-view="month" role="tab" aria-selected="true">Month</button>
              <button class="view-btn" data-view="week" role="tab" aria-selected="false">Week</button>
              <button class="view-btn" data-view="day" role="tab" aria-selected="false">Day</button>
              <button class="view-btn" data-view="agenda" role="tab" aria-selected="false">Agenda</button>
            </div>
          </div>
        </div>

        <!-- Calendar View Area -->
        <div id="calView" class="cal-view" role="region" aria-label="Calendar"></div>
      </main>
    </div><!-- /layout -->
  </div><!-- /app -->

  <!-- ═══════════════════════════════════════════
       FAB — Floating Action Button
       ═══════════════════════════════════════════ -->
  <button id="fab" class="fab" aria-label="Create new event" title="New event (N)">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- ═══════════════════════════════════════════
       BOTTOM NAVIGATION (Mobile)
       ═══════════════════════════════════════════ -->
  <nav class="bottom-nav" id="bottomNav" aria-label="Primary navigation">
    <button class="bn-btn active" data-nav="month" aria-label="Month view">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Calendar</span>
    </button>
    <button class="bn-btn" data-nav="agenda" aria-label="Agenda view">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>Agenda</span>
    </button>
    <button class="bn-btn" data-nav="search" aria-label="Search events">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span>Search</span>
    </button>
    <button class="bn-btn" data-nav="today" aria-label="Jump to today">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Today</span>
    </button>
  </nav>

  <!-- ═══════════════════════════════════════════
       SEARCH OVERLAY
       ═══════════════════════════════════════════ -->
  <div id="searchOverlay" class="overlay hidden" role="dialog" aria-modal="true" aria-label="Search events">
    <div class="search-panel">
      <div class="search-hdr">
        <div class="search-field">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="search" id="searchInput" class="search-inp" placeholder="Search by title, venue, or organizer…" autocomplete="off" />
        </div>
        <button id="searchClose" class="nav-icon-btn" aria-label="Close search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="search-filters">
        <select id="searchCategory" class="filter-sel" aria-label="Filter by category">
          <option value="">All Categories</option>
          <option value="Meeting">Meeting</option>
          <option value="Workshop">Workshop</option>
          <option value="Competition">Competition</option>
          <option value="Social">Social</option>
          <option value="Personal">Personal</option>
          <option value="Other">Other</option>
        </select>
        <select id="searchPriority" class="filter-sel" aria-label="Filter by priority">
          <option value="">All Priorities</option>
          <option value="High">High Priority</option>
          <option value="Medium">Medium Priority</option>
          <option value="Low">Low Priority</option>
        </select>
      </div>
      <div id="searchResults" class="search-results" aria-live="polite"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       EVENT MODAL
       ═══════════════════════════════════════════ -->
  <div id="eventModal" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">

      <!-- Modal Header -->
      <div class="modal-hdr">
        <div>
          <p class="eyebrow">OMINIA Event Planner</p>
          <h3 id="modalTitle">New Event</h3>
        </div>
        <div class="modal-hdr-btns">
          <button id="dupEventBtn" class="nav-icon-btn" title="Duplicate this event" aria-label="Duplicate event" style="display:none">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button id="closeModal" class="nav-icon-btn" aria-label="Close modal">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>

      <!-- Events on this day panel -->
      <div id="dayEvPanel" class="day-ev-panel hidden">
        <p id="dayEvPanelTitle" class="day-ev-label">Events on this day</p>
        <div id="eventList" class="event-list"></div>
      </div>

      <!-- Tabs -->
      <div class="modal-tabs" role="tablist">
        <button class="mtab active" data-tab="details" role="tab" aria-selected="true">Details</button>
        <button class="mtab" data-tab="guests" role="tab" aria-selected="false">Guests</button>
        <button class="mtab" data-tab="budget" role="tab" aria-selected="false">Budget</button>
        <button class="mtab" data-tab="notes" role="tab" aria-selected="false">Notes</button>
      </div>

      <!-- Form -->
      <form id="eventForm" class="ev-form" novalidate>

        <!-- Details Tab -->
        <div class="tab-pane active" id="tab-details">
          <label class="fl full">
            Event Title <span class="req" aria-hidden="true">*</span>
            <input type="text" id="evTitle" name="title" placeholder="What's happening?" required autocomplete="off" />
          </label>
          <div class="frow">
            <label class="fl">
              Date <span class="req" aria-hidden="true">*</span>
              <input type="date" id="evDate" name="date" required />
            </label>
            <label class="fl">
              End Date
              <input type="date" id="evEndDate" name="endDate" />
            </label>
          </div>
          <label class="fl ck-label">
            <input type="checkbox" id="evAllDay" name="allDay" />
            <span class="ck-text">All day event</span>
          </label>
          <div class="frow" id="timeRow">
            <label class="fl">
              Start Time
              <input type="time" id="evTime" name="time" value="09:00" />
            </label>
            <label class="fl">
              End Time
              <input type="time" id="evEndTime" name="endTime" value="10:00" />
            </label>
          </div>
          <div class="frow">
            <label class="fl">
              Category
              <select id="evCategory" name="category">
                <option value="Meeting">📋 Meeting</option>
                <option value="Workshop">🔧 Workshop</option>
                <option value="Competition">🏆 Competition</option>
                <option value="Social">🎉 Social</option>
                <option value="Personal">👤 Personal</option>
                <option value="Other">📌 Other</option>
              </select>
            </label>
            <label class="fl">
              Priority
              <select id="evPriority" name="priority">
                <option value="Low">🟢 Low</option>
                <option value="Medium" selected>🟡 Medium</option>
                <option value="High">🔴 High</option>
              </select>
            </label>
          </div>
          <div class="frow">
            <label class="fl">
              Status
              <select id="evStatus" name="status">
                <option value="Upcoming">⏳ Upcoming</option>
                <option value="In Progress">▶️ In Progress</option>
                <option value="Done">✅ Done</option>
                <option value="Cancelled">❌ Cancelled</option>
              </select>
            </label>
            <label class="fl">
              Event Color
              <div class="color-wrap">
                <input type="color" id="evColor" name="color" value="#6366f1" aria-label="Pick event color" />
                <span id="colorPreview" class="color-dot" style="background:#6366f1"></span>
                <span id="colorHex" class="color-hex">#6366f1</span>
              </div>
            </label>
          </div>
          <label class="fl full">
            Venue / Location
            <input type="text" id="evVenue" name="venue" placeholder="Room, address, or video link" autocomplete="off" />
          </label>
          <label class="fl full">
            Organizer
            <input type="text" id="evOrganizer" name="organizer" placeholder="Name or department" autocomplete="off" />
          </label>
          <div class="frow">
            <label class="fl">
              Reminder
              <select id="evReminder" name="reminder">
                <option value="0">No reminder</option>
                <option value="5">5 min before</option>
                <option value="15" selected>15 min before</option>
                <option value="30">30 min before</option>
                <option value="60">1 hour before</option>
                <option value="1440">1 day before</option>
              </select>
            </label>
            <label class="fl">
              Recurring
              <select id="evRecurring" name="recurring">
                <option value="none">Does not repeat</option>
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
              </select>
            </label>
          </div>
          <div id="recurUntilRow" class="frow" style="display:none">
            <label class="fl full">
              Repeat until
              <input type="date" id="evRecurUntil" name="recurUntil" />
            </label>
          </div>
        </div>

        <!-- Guests Tab -->
        <div class="tab-pane" id="tab-guests">
          <label class="fl full">
            Add Guests <span class="hint">(press Enter after each email)</span>
            <input type="text" id="evGuestInput" placeholder="guest@example.com" autocomplete="off" />
          </label>
          <div id="guestChips" class="guest-chips"></div>
          <input type="hidden" id="evGuests" name="guests" />
        </div>

        <!-- Budget Tab -->
        <div class="tab-pane" id="tab-budget">
          <div class="frow">
            <label class="fl">
              Amount
              <input type="number" id="evBudget" name="budget" min="0" step="0.01" placeholder="0.00" />
            </label>
            <label class="fl">
              Currency
              <select id="evCurrency" name="currency">
                <option value="USD">$ USD</option>
                <option value="EUR">€ EUR</option>
                <option value="GBP">£ GBP</option>
                <option value="NPR">रू NPR</option>
                <option value="INR">₹ INR</option>
                <option value="AUD">A$ AUD</option>
                <option value="JPY">¥ JPY</option>
              </select>
            </label>
          </div>
          <div id="budgetDisplay" class="budget-disp"></div>
        </div>

        <!-- Notes Tab -->
        <div class="tab-pane" id="tab-notes">
          <label class="fl full">
            Notes &amp; Details
            <textarea id="evNotes" name="notes" rows="9" placeholder="Add agenda items, links, instructions, or any additional context…"></textarea>
          </label>
        </div>

        <!-- Actions (always visible) -->
        <div class="form-actions">
          <button type="submit" class="btn-primary" id="saveBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            Save Event
          </button>
          <button type="button" class="btn-ghost" id="saveAsNewBtn" style="display:none">
            Save as New
          </button>
          <button type="button" id="resetForm" class="btn-ghost">Clear</button>
        </div>

      </form>
    </div><!-- /modal-card -->
  </div><!-- /eventModal -->

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-wrap" aria-live="polite" aria-atomic="false"></div>

  <!-- ═══════════════════════════════════════════
       AUTH OVERLAY
       ═══════════════════════════════════════════ -->
  <div id="authOverlay" class="overlay hidden" role="dialog" aria-modal="true" style="z-index: 9999;">
    <div class="modal-card" style="text-align: center; max-width: 400px; padding: 40px 20px;">
      <h2 style="margin-bottom: 10px;">Welcome to OMINIA</h2>
      <p style="color: var(--muted); margin-bottom: 30px;">Sign in to sync your events across all devices.</p>
      <button id="googleSignInBtn" class="btn-primary" style="width: 100%; justify-content: center; margin-bottom: 15px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 8px;"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>
      <button id="authCloseBtn" class="btn-ghost" style="width: 100%; justify-content: center;">Continue as Guest</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
